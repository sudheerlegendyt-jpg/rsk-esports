<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSK ESPORTS</title>

<link rel="stylesheet" href="style.css">

<style>

.tournaments{
    padding:60px 20px;
    background:#111;
    text-align:center;
}

.tournaments h2{
    color:red;
    margin-bottom:30px;
    font-size:35px;
}

.tournament-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
}

.tournament-card{
    background:#1b1b1b;
    border-radius:12px;
    overflow:hidden;
    border:2px solid red;
    transition:.3s;
    cursor:pointer;
}

.tournament-card:hover{
    transform:translateY(-8px);
}

.tournament-card img{
    width:100%;
    height:260px;
    object-fit:cover;
}

.tournament-card h3{
    color:red;
    margin-top:15px;
}

.tournament-card p{
    margin:8px;
    color:white;
}

.tournament-card button{
    margin:15px;
    width:90%;
    padding:12px;
    background:red;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

.tournament-card button:hover{
    background:#ff3333;
}

</style>

</head>

<body>

<header>

<h1>🎮 RSK ESPORTS</h1>

<nav>

<a href="index.html">Home</a>

<a href="tournament.html">Tournament</a>

<a href="login.html">Player Login</a>

<a href="signup.html">Sign Up</a>

<a href="admin-login.html">Admin Login</a>

</nav>

</header>

<section class="hero">

<div class="overlay">

<h2>RSK ESPORTS</h2>

<p>Play • Compete • Win</p>

<a href="tournament.html">
<button>Explore Tournament</button>
</a>

</div>

</section>

<section class="tournaments">

<h2>🏆 Live Tournaments</h2>

<div class="tournament-grid" id="tournamentContainer">

Loading Tournaments...

</div>
</section>

<script>

async function loadTournaments(){

    try{

        const res = await fetch("/api/tournament/all");

        const data = await res.json();

        const container = document.getElementById("tournamentContainer");

        container.innerHTML="";

        if(data.success && data.tournaments.length){

            data.tournaments.forEach(t=>{

                container.innerHTML += `

                <div class="tournament-card">

                <img
                src="${t.poster}"
                onclick="window.location.href='tournament-register.html'">

                <h3>${t.tournamentName}</h3>

                <p>🎮 ${t.game}</p>

                <p>📅 ${t.date}</p>

                <p>💰 Entry Fee : ₹${t.entryFee}</p>

                <p>🏆 Prize Pool : ${t.prizePool}</p>

                <p>🔴 ${t.status}</p>

                <button
                onclick="window.location.href='tournament-register.html'">

                Register Now

                </button>

                </div>

                `;

            });

        }else{

            container.innerHTML="<h2>No Tournament Available</h2>";

        }

    }catch(err){

        console.log(err);

    }

}

loadTournaments();

</script>


</body>
</html>
