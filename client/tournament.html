<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournament Registration | RSK ESPORTS</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container" style="max-width:700px;margin:60px auto;background:#1a1a1a;padding:30px;border-radius:10px;">

<h1 style="text-align:center;color:red;">Tournament Registration</h1>

<form>

<label>Player Name</label><br>
<input type="text" placeholder="Enter Name" required style="width:100%;padding:10px;margin:10px 0;"><br>

<label>Game UID</label><br>
<input type="text" placeholder="Enter UID" required style="width:100%;padding:10px;margin:10px 0;"><br>

<label>Email</label><br>
<input type="email" placeholder="Enter Email" required style="width:100%;padding:10px;margin:10px 0;"><br>

<label>Phone</label><br>
<input type="tel" placeholder="Enter Phone Number" required style="width:100%;padding:10px;margin:10px 0;"><br>

<button type="submit">Register</button>

</form>

</div>

</body>
</html>
