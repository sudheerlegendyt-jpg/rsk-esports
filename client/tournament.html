<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Registration | RSK ESPORTS</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container" style="max-width:700px;margin:60px auto;background:#1a1a1a;padding:30px;border-radius:10px;">

    <h1 style="text-align:center;color:red;">Tournament Registration</h1>

    <form id="registrationForm">

        <label>Player Name</label><br>
        <input type="text" id="playerName" required><br><br>

        <label>Game UID</label><br>
        <input type="text" id="gameUID" required><br><br>

        <label>Email</label><br>
        <input type="email" id="email" required><br><br>

        <label>Phone Number</label><br>
        <input type="text" id="phone" required><br><br>

        <button type="submit">Register</button>

    </form>

</div>

<script>
document.getElementById("registrationForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        playerName: document.getElementById("playerName").value,
        gameUID: document.getElementById("gameUID").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value
    };

    try {
        const res = await fetch("/api/tournament/register", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.success) {
            alert("✅ Registration Successful!");
            document.getElementById("registrationForm").reset();
        } else {
            alert(result.message);
        }

    } catch (err) {
        console.error(err);
        alert("❌ Server Error");
    }
});
</script>

</body>
</html>
