<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Signup | RSK ESPORTS</title>

<link rel="stylesheet" href="style.css">

<style>
.signup-box{
    width:380px;
    margin:80px auto;
    background:#1b1b1b;
    padding:30px;
    border-radius:10px;
    border:2px solid red;
}

.signup-box h2{
    text-align:center;
    color:red;
    margin-bottom:20px;
}

.signup-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:#111;
    color:white;
    border:1px solid #444;
    border-radius:5px;
    outline:none;
}

.signup-box button{
    width:100%;
    padding:12px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

.signup-box button:hover{
    background:#ff3333;
}

.signup-box p{
    text-align:center;
    margin-top:15px;
}

.signup-box a{
    color:red;
    text-decoration:none;
}
</style>

</head>
<body>

<header>
<h1>🎮 RSK ESPORTS</h1>

<nav>
<a href="index.html">Home</a>
<a href="tournament.html">Tournament</a>
<a href="login.html">Login</a>
<a href="signup.html">Signup</a>
</nav>
</header>

<div class="signup-box">

<h2>Create Account</h2>

<form id="signupForm">

<input type="text" id="name" placeholder="Player Name" required>

<input type="email" id="email" placeholder="Gmail Address" required>

<input type="password" id="password" placeholder="Create Password" required>

<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

<button type="submit">Create Account</button>

</form>

<p>Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script>
document.getElementById("signupForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Passwords do not match!");
        return;
    }

    const player = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: password
    };

    try{

        const res = await fetch("/api/player/signup",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(player)
        });

        const data = await res.json();

        if(data.success){

            alert("✅ Account Created Successfully");

            window.location.href="login.html";

        }else{

            alert(data.message);

        }

    }catch(err){

        console.log(err);
        alert("Server Error");

    }

});
</script>
</body>
</html>
