<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Dashboard | RSK ESPORTS</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    background:#0d0d0d;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

header{
    background:#111;
    padding:20px;
    text-align:center;
    border-bottom:2px solid red;
}

header h1{
    color:red;
}

.container{
    width:90%;
    max-width:1000px;
    margin:40px auto;
}

.card{
    background:#1b1b1b;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    border-left:5px solid red;
}

.card h2{
    color:red;
}

button{
    padding:12px 25px;
    background:red;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#ff3333;
}
</style>

</head>

<body>

<header>
    <h1>RSK ESPORTS PLAYER DASHBOARD</h1>
</header>

<div class="container">

<div class="card">
<h2>Welcome Player 🎮</h2>
<p>Your account has been created successfully.</p>
</div>

<div class="card">
<h2>My Tournament</h2>
<p>You have successfully registered for the tournament.</p>
</div>

<div class="card">
<h2>Payment Status</h2>
<p>Pending</p>
</div>

<div class="card">
<h2>Latest Notice</h2>
<p>No new notices.</p>
</div>

<button onclick="window.location.href='index.html'">
Back to Home
</button>

</div>

</body>
</html>
