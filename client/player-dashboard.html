<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Dashboard | RSK ESPORTS</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#0d0d0d;
    color:white;
    font-family:Arial,sans-serif;
    margin:0;
}

header{
    background:#111;
    padding:20px;
    text-align:center;
    border-bottom:2px solid red;
}

header h1{
    color:red;
    font-size:40px;
}

.container{
    width:90%;
    max-width:1000px;
    margin:40px auto;
}

.card{
    background:#1b1b1b;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    border-left:5px solid red;
}

.card h2{
    color:red;
    margin-bottom:10px;
}

.card p{
    font-size:18px;
}

button{
    padding:12px 25px;
    background:red;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin-right:10px;
}

button:hover{
    background:#ff3333;
}

</style>

</head>

<body>

<header>
<h1>🎮 RSK ESPORTS PLAYER DASHBOARD</h1>
</header>

<div class="container">

<div class="card">
<h2 id="welcome">Welcome Player 🎮</h2>
<p id="welcomeText">Loading...</p>
</div>

<div class="card">
<h2>🏆 My Tournament</h2>
<p id="tournament">No Tournament Joined</p>
</div>

<div class="card">
<h2>💳 Payment Status</h2>
<p id="payment">Pending</p>
</div>

<div class="card">
<h2>📢 Latest Notice</h2>
<p id="notice">No New Notice</p>
</div>

<button onclick="window.location.href='index.html'">
🏠 Back to Home
</button>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<script>

async function loadPlayerDashboard(){

const email = localStorage.getItem("playerEmail");

if(!email){

document.getElementById("welcome").innerHTML="Welcome Player 🎮";
document.getElementById("welcomeText").innerHTML="Please Login First";
return;

}

try{

const res = await fetch("/api/player/profile/"+email);

const data = await res.json();

if(data.success){

document.getElementById("welcome").innerHTML =
"Welcome "+data.player.name+" 🎮";

document.getElementById("welcomeText").innerHTML =
"Email : "+data.player.email;

document.getElementById("payment").innerHTML =
data.player.paymentStatus || "Pending";

document.getElementById("tournament").innerHTML =
data.player.tournament || "No Tournament Joined";

document.getElementById("notice").innerHTML =
data.player.notice || "No New Notice";

}else{

document.getElementById("welcomeText").innerHTML="Player Not Found";

}

}catch(err){

console.log(err);

document.getElementById("welcomeText").innerHTML="Dashboard Loaded";

}

}

function logout(){

localStorage.removeItem("playerEmail");

alert("Logout Successful");

window.location.href="login.html";

}

window.onload=loadPlayerDashboard;

</script>

</body>
</html>
