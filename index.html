<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSK ESPORTS | Play Beyond Limits</title>
    <script src="https://tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0c; font-family: system-ui, sans-serif; }
        .glass-panel { background: rgba(18, 18, 22, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 0, 60, 0.15); }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between">

    <!-- Simple Dynamic Navigation -->
    <nav class="sticky top-0 z-50 bg-[#121216]/95 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="cursor-pointer font-black text-2xl tracking-wider" onclick="location.href='/'">
            RSK <span class="text-[#ff003c]">ESPORTS</span>
        </div>
        <div class="hidden md:flex gap-6 text-xs font-bold uppercase tracking-wider">
            <a href="/" class="hover:text-[#ff003c] transition">Home</a>
            <a href="/?page=tournaments" class="hover:text-[#ff003c] transition">Tournaments</a>
            <a href="/?page=leaderboard" class="hover:text-[#ff003c] transition">Leaderboard</a>
            <a href="/admin" class="hover:text-[#ff003c] transition font-bold text-[#ff003c]">Admin Center ⚙️</a>
        </div>
    </nav>

    <main class="flex-grow flex flex-col justify-center">
        <div id="root-content" class="w-full">
            <!-- Content will be injected by native script below -->
        </div>
    </main>

    <footer class="bg-[#121216] border-t border-white/10 p-6 text-center text-xs text-gray-500">
        <p class="font-bold text-white uppercase mb-1">RSK ESPORTS SYSTEM</p>
    </footer>

    <script>
        // Real-time memory storage variables
        if(!localStorage.getItem('rsk_tagline')) localStorage.setItem('rsk_tagline', 'Play Beyond Limits');
        if(!localStorage.getItem('rsk_banner')) localStorage.setItem('rsk_banner', 'BGMI Pro League: Season 4');
        if(!localStorage.getItem('rsk_pool')) localStorage.setItem('rsk_pool', '₹5,000,000');

        const currentPath = window.location.pathname;
        const searchParams = new URLSearchParams(window.location.search);
        const pageParam = searchParams.get('page');
        const rootDiv = document.getElementById('root-content');

        // Direct URL Routing Engine Framework
        if (currentPath === '/admin') {
            rootDiv.innerHTML = `
                <div class="max-w-md mx-auto p-6 glass-panel rounded-xl space-y-4 my-12">
                    <h3 class="text-xl font-black uppercase text-center">Admin <span class="text-[#ff003c]">Portal</span></h3>
                    <input type="text" id="admin-user" placeholder="Username (admin)" class="w-full bg-white/5 border border-white/10 p-3 rounded text-sm text-white outline-none focus:border-[#ff003c]" value="admin" />
                    <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-white/5 border border-white/10 p-3 rounded text-sm text-white outline-none focus:border-[#ff003c]" />
                    <button onclick="checkAccess()" class="w-full bg-[#ff003c] text-white py-3 font-bold text-xs uppercase tracking-wider rounded cursor-pointer">Login Control Room</button>
                    <div id="dash-box" class="hidden pt-4 border-t border-white/10 space-y-4">
                        <h4 class="font-bold text-xs uppercase text-green-500">⚙️ System Access Granted</h4>
                        <input type="text" id="edit-tagline" class="w-full bg-white/5 border border-white/10 p-2 rounded text-xs text-white" value="${localStorage.getItem('rsk_tagline')}" />
                        <input type="text" id="edit-banner" class="w-full bg-white/5 border border-white/10 p-2 rounded text-xs text-white" value="${localStorage.getItem('rsk_banner')}" />
                        <input type="text" id="edit-pool" class="w-full bg-white/5 border border-white/10 p-2 rounded text-xs text-white" value="${localStorage.getItem('rsk_pool')}" />
                        <button onclick="saveChangesNow()" class="w-full bg-green-600 font-bold text-xs py-2 uppercase rounded cursor-pointer">Apply Overrides</button>
                    </div>
                </div>`;
        } else if (pageParam === 'tournaments') {
            rootDiv.innerHTML = `
                <div class="max-w-4xl mx-auto px-6 py-12 space-y-6">
                    <h2 class="text-3xl font-black uppercase text-center">Active <span class="text-[#ff003c]">Tournaments</span></h2>
                    <div class="glass-panel p-5 rounded-xl flex flex-wrap items-center justify-between gap-4">
                        <div><span class="bg-[#ff003c] text-[9px] font-black px-2 py-0.5 rounded uppercase">Upcoming</span><h3 class="text-lg font-bold uppercase mt-1">BGMI Ultimate Showdown</h3></div>
                        <button class="bg-white text-black font-bold text-xs px-4 py-2 uppercase">Register</button>
                    </div>
                </div>`;
        } else if (pageParam === 'leaderboard') {
            rootDiv.innerHTML = `
                <div class="max-w-4xl mx-auto px-6 py-12 space-y-6">
                    <h2 class="text-3xl font-black uppercase text-center">Live <span class="text-[#ff003c]">Standings</span></h2>
                    <div class="glass-panel rounded-xl p-4"><table class="w-full text-left"><thead><tr class="text-gray-500 text-xs font-bold"><th class="p-2">Rank</th><th class="p-2">Team</th></tr></thead><tbody><tr><td class="p-2 text-[#ff003c]">#1</td><td class="p-2 font-bold uppercase">GodLike Esports</td></tr></tbody></table></div>
                </div>`;
        } else {
            rootDiv.innerHTML = `
                <section class="min-h-[50vh] flex flex-col justify-center items-center text-center px-6 bg-[radial-gradient(circle_at_center,rgba(255,0,60,0.15)_0%,transparent_60%)]">
                    <h2 class="text-xs font-bold tracking-[0.4em] text-[#ff003c] uppercase mb-2">${localStorage.getItem('rsk_tagline')}</h2>
                    <h1 class="text-5xl md:text-7xl font-black uppercase mb-6">RSK <span class="text-[#ff003c]">ESPORTS</span></h1>
                </section>
                <section class="max-w-4xl mx-auto px-6 py-8">
                    <div class="glass-panel p-6 rounded-xl relative max-w-md mx-auto">
                        <span class="absolute top-0 right-0 bg-[#ff003c] text-[9px] font-bold px-3 py-1 uppercase">Live</span>
                        <h3 class="text-xl font-black uppercase mb-2">${localStorage.getItem('rsk_banner')}</h3>
                        <div class="mt-4 pt-4 border-t border-white/5"><span class="text-xs text-gray-500 uppercase block">Prize Pool</span><span class="text-2xl font-black text-[#ff003c]">${localStorage.getItem('rsk_pool')}</span></div>
                    </div>
                </section>`;
        }

        function checkAccess() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === 'rsk123') {
                document.getElementById('dash-box').classList.remove('hidden');
            } else {
                alert('Galat Password!');
            }
        }

        function saveChangesNow() {
            localStorage.setItem('rsk_tagline', document.getElementById('edit-tagline').value);
            localStorage.setItem('rsk_banner', document.getElementById('edit-banner').value);
            localStorage.setItem('rsk_pool', document.getElementById('edit-pool').value);
            alert('Settings data live overwrite ho gaya!');
            location.href = '/';
        }
    </script>
</body>
</html>
